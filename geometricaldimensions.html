<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometrical Dimensions — Emil Faisal Hasselberg</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="project">
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-title" href="index.html">EMIL FAISAL HASSELBERG</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="about.html">About me</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>
  <main class="container prose">
    <a class="back-link" href="index.html">← Back</a>
    <article class="project-view project-layout">
      <section class="project-media">
        <figure class="project-hero"><img id="projectMainImage" src="GeometricalDimensions_1.jpg" alt="Geometrical Dimensions — 2023 — 2024" /></figure>
        <section class="project-gallery" id="projectGallery" aria-label="Geometrical Dimensions images"></section>
      </section>
      <section class="project-copy">
        <h1 class="page-title">Geometrical Dimensions — 2023 — 2024</h1>
        <p>A body of work consisting of wall hanging objects and sculptures with focus on materiality, patination as a color palette and geometrical aesthetics.</p>
      </section>
    </article>
    <div class="mobile-about-wrap"><a class="mobile-about-link" href="about.html">About me</a></div>
  </main>
  <script src="script.js"></script>
  <script>
    (function () {
      const gallery = document.getElementById("projectGallery");
      const mainImage = document.getElementById("projectMainImage");
      if (!gallery || !mainImage) return;
      const folder = "";
      const files = [
        "GeometricalDimensions_1.jpg",
        "GeometricalDimensions_2.jpg",
        "GeometricalDimensions_3.jpg",
        "GeometricalDimensions_4.jpg",
        "GeometricalDimensions_5.jpg",
        "GeometricalDimensions_6.jpg",
        "GeometricalDimensions_7.jpg",
        "GeometricalDimensions_8.jpg",
        "GeometricalDimensions_9.jpg",
        "GeometricalDimensions_10.jpg"
      ];
      const isMobileLayout = window.matchMedia("(max-width: 980px)").matches;
      let firstValidButton = null;
      function setMainImage(src, alt) { if (!src || mainImage.src === src) return; mainImage.classList.add("is-loading"); const preload = new Image(); preload.onload = function () { mainImage.src = src; mainImage.alt = alt || ""; requestAnimationFrame(function () { mainImage.classList.remove("is-loading"); }); }; preload.onerror = function () { mainImage.classList.remove("is-loading"); }; preload.src = src; }
      files.forEach((file, i) => { const button = document.createElement("button"); button.type = "button"; button.className = "project-gallery-item"; const img = document.createElement("img"); img.loading = "lazy"; img.src = `${folder}${file}`; img.alt = `Geometrical Dimensions image ${i + 1}`; img.onerror = function () { button.remove(); }; if (!isMobileLayout) { button.addEventListener("click", function () { setMainImage(img.src, img.alt); gallery.querySelectorAll(".project-gallery-item.active").forEach(el => el.classList.remove("active")); button.classList.add("active"); }); } button.appendChild(img); gallery.appendChild(button); if (!firstValidButton) firstValidButton = button; });
      if (firstValidButton && !isMobileLayout) firstValidButton.classList.add("active");
    })();
  </script>
</body>
</html>
